name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── x86-64 (AVX2) ──────────────────────────────────────────────────────────
  x86:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake g++ libsqlite3-dev

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Test
        run: ctest --test-dir build --output-on-failure

  # ── ARM64 (SVE via cross-compile + QEMU) ───────────────────────────────────
  # Ampere Altra (GitHub ARM runners) lacks SVE, so we cross-compile on x86
  # and run under QEMU user-mode emulation with SVE enabled.
  arm-sve:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install cross-compiler and QEMU
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++-aarch64-linux-gnu qemu-user

      - name: Create CMake cross-compile toolchain
        run: |
          cat > toolchain-aarch64.cmake << 'EOF'
          set(CMAKE_SYSTEM_NAME Linux)
          set(CMAKE_SYSTEM_PROCESSOR aarch64)
          set(CMAKE_C_COMPILER aarch64-linux-gnu-gcc)
          set(CMAKE_CXX_COMPILER aarch64-linux-gnu-g++)
          set(CMAKE_FIND_ROOT_PATH /usr/aarch64-linux-gnu)
          set(CMAKE_FIND_ROOT_PATH_MODE_PROGRAM NEVER)
          set(CMAKE_FIND_ROOT_PATH_MODE_LIBRARY ONLY)
          set(CMAKE_FIND_ROOT_PATH_MODE_INCLUDE ONLY)
          EOF

      - name: Configure (cross-compile for aarch64+SVE)
        run: |
          cmake -B build \
            -DCMAKE_TOOLCHAIN_FILE=toolchain-aarch64.cmake \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CROSSCOMPILING_EMULATOR="qemu-aarch64;-L;/usr/aarch64-linux-gnu;-cpu;max"

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Test (QEMU aarch64 with SVE)
        run: ctest --test-dir build --output-on-failure
